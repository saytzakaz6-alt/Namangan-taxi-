<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namangan Taxi | Rasmiy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <div class="bg-yellow-400 p-8 text-center shadow-md border-b-4 border-gray-900">
        <div class="w-20 h-20 bg-gray-900 rounded-full mx-auto mb-4 flex items-center justify-center shadow-xl border-4 border-white">
            <span class="text-yellow-400 text-3xl font-black italic">NT</span>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter text-gray-900 uppercase">
            NAMANGAN TAXI
        </h1>
        <p class="text-[10px] font-bold text-gray-800 mt-2 uppercase tracking-widest">
            taxi odam va pochta xizmati
        </p>
    </div>

    <div class="p-4 max-w-md mx-auto -mt-4">
        <a href="tel:+998997606030" class="flex items-center justify-between bg-white p-4 rounded-2xl shadow-lg border-2 border-green-500 animate-pulse">
            <div class="flex items-center gap-3">
                <div class="bg-green-500 p-2 rounded-full text-white">
                    <i class="fa fa-phone"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase">Aloqa markazi</p>
                    <p class="text-sm font-black text-gray-800">Haydovchi bilan bog'lanish</p>
                </div>
            </div>
            <span class="text-green-600 font-black">99 760 60 30</span>
        </a>
    </div>

    <div class="flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl p-8 border-t-8 border-yellow-400">
            <form id="taxiForm" class="space-y-4">
                
                <input type="text" id="userName" placeholder="Ism va Telefon" required 
                class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:border-yellow-400">

                <input type="text" id="userDest" placeholder="Qayerdan qayerga?" required 
                class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:border-yellow-400">

                <label class="block text-xs font-bold text-gray-500 ml-2 uppercase">Xizmat turi:</label>
                <select id="userTarif" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none font-semibold text-gray-800">
                    <option value="Pochta xizmati - 60,000">📦 Pochta — 60,000</option>
                    <option value="Komfort Oldi - 220,000">✨ Komfort Oldi — 220,000</option>
                    <option value="Komfort Orqa - 180,000">✨ Komfort Orqa — 180,000</option>
                    <option value="Ekonom Oldi - 180,000">🚕 Ekonom Oldi — 180,000</option>
                    <option value="Ekonom Orqa - 140,000">🚕 Ekonom Orqa — 140,000</option>
                </select>

                <div class="p-4 bg-blue-50 rounded-2xl border-2 border-dashed border-blue-200 text-center">
                    <button type="button" onclick="getLocation()" id="locBtn" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-bold active:scale-95 transition">
                        📍 LOKATSIYANI YUBORISH
                    </button>
                    <p id="locStatus" class="text-[10px] mt-2 text-blue-400 font-bold uppercase italic">Manzil aniqlanmagan</p>
                </div>

                <textarea id="userMsg" placeholder="Izoh (yuk bormi yoki pochta nimaligi)" 
                class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl h-24 outline-none focus:border-yellow-400"></textarea>

                <button type="submit" id="submitBtn" class="w-full bg-gray-900 hover:bg-black text-yellow-400 font-black py-5 rounded-2xl text-xl shadow-xl active:scale-95 transition-all uppercase">
                    BUYURTMA BERISH
                </button>
            </form>
        </div>
    </div>

    <script>
        let gpsLink = "Lokatsiya yuborilmadi";

        function getLocation() {
            const btn = document.getElementById('locBtn');
            const status = document.getElementById('locStatus');
            if (navigator.geolocation) {
                btn.innerText = "QIDIRILMOQDA...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    gpsLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    status.innerText = "Lokatsiya aniqlandi ✅";
                    status.className = "text-[10px] mt-2 text-green-600 font-bold uppercase";
                    btn.innerText = "TAYYOR";
                    btn.className = "bg-green-600 text-white px-6 py-2 rounded-xl text-xs font-bold";
                }, () => { status.innerText = "Ruxsat berilmadi ❌"; });
            }
        }

        const BOT_TOKEN = "8746616431:AAGwg28OBGR8l1GpEr84I3QlNYpNUuiyMl8";
        const RECIPIENTS = ["8096895515", "8514630685"]; 

        document.getElementById('taxiForm').onsubmit = async (e) => {
            e.preventDefault();
            const sBtn = document.getElementById('submitBtn');
            sBtn.innerText = "YUBORILMOQDA...";
            sBtn.disabled = true;

            const name = document.getElementById('userName').value;
            const dest = document.getElementById('userDest').value;
            const tarif = document.getElementById('userTarif').value;
            const msg = document.getElementById('userMsg').value || "Yo'q";

            const header = tarif.includes("Pochta") ? "📦 NAMANGAN TAXI | POCHTA" : "🚖 NAMANGAN TAXI | BUYURTMA";

            const fullText = `*${header}*\n\n` +
                             `👤 *Mijoz:* ${name}\n` +
                             `📍 *Yo'nalish:* ${dest}\n` +
                             `🏷️ *Xizmat:* ${tarif}\n` +
                             `💬 *Izoh:* ${msg}\n\n` +
                             `📍 *Xarita:* ${gpsLink}`;

            try {
                for (const id of RECIPIENTS) {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: id, text: fullText, parse_mode: "Markdown" })
                    });
                }
                alert("✅ Buyurtmangiz qabul qilindi. Operator tez orada bog'lanadi!");
                location.reload();
            } catch (err) {
                alert("❌ Xatolik yuz berdi!");
                sBtn.disabled = false;
                sBtn.innerText = "BUYURTMA BERISH";
            }
        };
    </script>
</body>
</html>
